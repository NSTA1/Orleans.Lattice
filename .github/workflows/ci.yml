name: CI

on:
  pull_request:
    branches: [main]

# Least-privilege: this workflow only reads source code.
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Classify what changed so we can skip expensive steps when the PR only
      # touches docs, or run a lightweight samples-only build when nothing
      # outside samples/ (plus docs) changed.
      #
      # Outputs:
      #   code       — at least one non-doc file changed (any *.md / docs/** only => false).
      #   nonSample  — at least one non-doc, non-sample file changed.
      #
      # Derived: samples-only == (code == 'true' && nonSample == 'false').
      - name: Check for non-markdown changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          predicate-quantifier: every
          filters: |
            code:
              - '!**.md'
              - '!docs/**'
            nonSample:
              - '!**.md'
              - '!docs/**'
              - '!samples/**'

      # Per-package detection. Default `some` quantifier: a filter is true if
      # any changed file matches any listed pattern. `core` covers the core
      # library subtree; `replication` covers the replication package subtree.
      # When neither matched (e.g. the PR only edits Orleans.Lattice.slnx or a
      # shared root file) we conservatively run both.
      - name: Detect package scope
        id: scope
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'src/lattice/**'
              - 'test/lattice/**'
              - 'docs/lattice/**'
            replication:
              - 'src/lattice.replication/**'
              - 'test/lattice.replication/**'
              - 'docs/lattice.replication/**'

      - name: Setup .NET
        if: steps.filter.outputs.code == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Cache ~/.nuget/packages between runs.
      - name: Cache NuGet packages
        if: steps.filter.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      # Samples-only fast path: build every project under samples/ and stop.
      # The samples reference the library as a ProjectReference, so this
      # transitively compiles Orleans.Lattice too — enough to catch breaks
      # introduced by sample-side edits without paying for the full test suite.
      - name: Build samples (samples-only change)
        if: steps.filter.outputs.code == 'true' && steps.filter.outputs.nonSample != 'true'
        run: |
          shopt -s nullglob
          projects=(samples/**/*.csproj)
          if [ ${#projects[@]} -eq 0 ]; then
            echo "No sample projects found under samples/."
            exit 1
          fi
          for proj in "${projects[@]}"; do
            echo "::group::Build $proj"
            dotnet build "$proj" --configuration Release
            echo "::endgroup::"
          done

      - name: Restore
        if: steps.filter.outputs.nonSample == 'true'
        run: dotnet restore

      - name: Build
        if: steps.filter.outputs.nonSample == 'true'
        run: dotnet build --no-restore --configuration Release

      # Per-package test execution. A package is tested when its own subtree
      # changed (`scope.<pkg> == 'true'`) or when only shared/root files
      # changed (neither subtree matched) so we don't silently skip the suite
      # for an Orleans.Lattice.slnx edit.
      - name: Test core (chaos first — isolate flaky-prone surface)
        if: steps.filter.outputs.nonSample == 'true' && (steps.scope.outputs.core == 'true' || steps.scope.outputs.replication != 'true')
        run: dotnet test test/lattice/Orleans.Lattice.Tests.csproj --no-build --configuration Release --filter "TestCategory=Chaos" --logger "trx;LogFileName=core-chaos.trx"

      - name: Test core (deterministic)
        if: steps.filter.outputs.nonSample == 'true' && (steps.scope.outputs.core == 'true' || steps.scope.outputs.replication != 'true')
        run: dotnet test test/lattice/Orleans.Lattice.Tests.csproj --no-build --configuration Release --filter "TestCategory!=Chaos" --logger "trx;LogFileName=core-results.trx"

      - name: Test replication (chaos first — isolate flaky-prone surface)
        if: steps.filter.outputs.nonSample == 'true' && (steps.scope.outputs.replication == 'true' || steps.scope.outputs.core != 'true')
        run: dotnet test test/lattice.replication/Orleans.Lattice.Replication.Tests.csproj --no-build --configuration Release --filter "TestCategory=Chaos" --logger "trx;LogFileName=replication-chaos.trx"

      - name: Test replication (deterministic)
        if: steps.filter.outputs.nonSample == 'true' && (steps.scope.outputs.replication == 'true' || steps.scope.outputs.core != 'true')
        run: dotnet test test/lattice.replication/Orleans.Lattice.Replication.Tests.csproj --no-build --configuration Release --filter "TestCategory!=Chaos" --logger "trx;LogFileName=replication-results.trx"

      # Upload test results even if the Test step fails.
      - name: Upload test results
        if: always() && steps.filter.outputs.nonSample == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
