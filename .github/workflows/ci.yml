name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Least-privilege: this workflow only reads source code.
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Skip build & test when only markdown files changed.
      - name: Check for non-markdown changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '!**.md'

      - name: Setup .NET
        if: steps.filter.outputs.code == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Cache ~/.nuget/packages between runs.
      - name: Cache NuGet packages
        if: steps.filter.outputs.code == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        if: steps.filter.outputs.code == 'true'
        run: dotnet restore

      - name: Build
        if: steps.filter.outputs.code == 'true'
        run: dotnet build --no-restore --configuration Release

      - name: Test
        if: steps.filter.outputs.code == 'true'
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=results.trx"

      # Upload test results even if the Test step fails.
      - name: Upload test results
        if: always() && steps.filter.outputs.code == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/results.trx"
