# MultiSiteManufacturing - Docker Compose topology (M14 + Traefik).
#
# Two Orleans clusters, each with its own Azurite and its own internal
# cluster network. There is NO shared silo-to-silo network: a forge
# silo cannot resolve or open a TCP connection to a heattreat silo,
# and vice versa. The only bridge between the two clusters is the
# Traefik reverse proxy in front of each cluster, which is multi-homed
# onto both cluster networks:
#
#   traefik-forge      : forge-net + heattreat-net
#   traefik-heattreat  : heattreat-net + forge-net
#
# That means a forge silo reaches the heattreat cluster by POSTing to
# `traefik-heattreat` (reachable on forge-net because traefik-heattreat
# is attached to forge-net) and Traefik then forwards the request onto
# heattreat-net to one of the heattreat silos. Nothing else crosses.
#
# Each Traefik provides its cluster's single public endpoint:
#   - Sticky-session load balancing across the cluster's two silos for
#     the Blazor UI (SignalR must pin to one silo per browser tab).
#   - Round-robin (non-sticky) load balancing across the same two silos
#     for the cross-cluster replication POSTs on /replicate/*.
#
# Only TWO host ports are published:
#   5001 -> traefik-forge     -> sticky LB (UI) + round-robin (replication)
#   5002 -> traefik-heattreat -> sticky LB (UI) + round-robin (replication)
#
# Silo HTTP (:8080), Orleans silo (:11111), and gateway (:30000) ports
# are `expose`-d only on their internal networks - nothing silo-side
# is reachable from the host.
#
# Networks (full membership):
#   forge-net:      azurite-forge, silo-forge-{a,b}, traefik-forge,
#                   traefik-heattreat   (as the cross-cluster ingress)
#   heattreat-net:  azurite-heattreat, silo-heattreat-{a,b}, traefik-heattreat,
#                   traefik-forge       (as the cross-cluster ingress)
#
# Cluster isolation properties:
#   silo-forge-a  -> silo-forge-b       : direct (forge-net)           OK
#   silo-forge-*  -> traefik-heattreat  : direct (forge-net)           OK
#   silo-forge-*  -> silo-heattreat-*   : NO SHARED NETWORK - blocked  OK
#
# Replication path in this topology:
#   silo-forge-X  --(forge-net)--> traefik-heattreat --(heattreat-net)--> silo-heattreat-{a|b}
#
# The peer config lists a single URL per peer (the peer's Traefik,
# resolvable on the local cluster network because the peer Traefik is
# multi-homed there). ReplicationHttpClient still supports a multi-URL
# BaseUrls list for topologies that want explicit per-silo failover
# instead of an LB (for example a multi-zone deployment where each
# zone has its own Traefik); here we use the one-URL form because
# Traefik's active health check already evicts unhealthy silos from
# rotation within ~2s.
#
# Simulate a cross-cluster partition (Tier 5):
#   # Sever forge -> heattreat (remove peer Traefik from local cluster net):
#   docker network disconnect msmfg_forge-net     msmfg-traefik-heattreat
#   docker network disconnect msmfg_heattreat-net msmfg-traefik-forge
#   # Restore:
#   docker network connect    msmfg_forge-net     msmfg-traefik-heattreat
#   docker network connect    msmfg_heattreat-net msmfg-traefik-forge
#
# Disconnecting the peer Traefik from the local cluster net removes
# the only route from local silos to the peer cluster; the replicator's
# HTTP POST fails, exponential backoff engages, and on reconnect the
# replog drains in HLC order. That is a genuine transport-level
# partition, not the hash-filter sim in
# FederationRouter.IsDroppedByPartitionAsync (Tier 4) - the two Tier
# types coexist; Tier 5 is network-level, Tier 4 stays as a fast-path
# simulation that requires no docker interaction.

name: msmfg

networks:
  forge-net:
    driver: bridge
  heattreat-net:
    driver: bridge

volumes:
  azurite-forge-data:
  azurite-heattreat-data:

x-silo-common: &silo-common
  build:
    context: ../../
    dockerfile: samples/MultiSiteManufacturing/Dockerfile
  image: msmfg-host:dev
  restart: unless-stopped
  environment:
    # Orleans + ASP.NET Core bind configuration. ASPNETCORE_URLS must
    # bind 0.0.0.0 (via "+") so host port publishing reaches the app;
    # localhost inside a container only binds the loopback interface.
    ASPNETCORE_URLS: "http://+:8080"
    ASPNETCORE_ENVIRONMENT: "Production"
    # Each container has its own IP, so all silos can share fixed
    # Orleans ports - no A/B split needed inside the container. The
    # appsettings overlay still provides per-A/B ports for the legacy
    # localhost run.ps1 path; we override them here.
    Cluster__SiloPortA: "11111"
    Cluster__SiloPortB: "11111"
    Cluster__GatewayPortA: "30000"
    Cluster__GatewayPortB: "30000"
  expose:
    - "8080"
    - "11111"
    - "30000"

# ---- Traefik common config ------------------------------------------
# Use the file provider, not the docker provider. Docker Desktop on
# Windows frequently returns "Error response from daemon" on every
# docker-API call from inside a container, which leaves the docker
# provider with zero discovered routers and makes Traefik answer 404
# for every request. The file provider is trivial, socket-free, and
# just as capable for a two-backend sticky-LB setup.
x-traefik-common: &traefik-common
  image: traefik:v3.1
  restart: unless-stopped

services:
  # ----- Forge cluster --------------------------------------------------
  azurite-forge:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: msmfg-azurite-forge
    restart: unless-stopped
    command:
      - "azurite"
      - "--blobHost"
      - "0.0.0.0"
      - "--queueHost"
      - "0.0.0.0"
      - "--tableHost"
      - "0.0.0.0"
      - "--location"
      - "/data"
      - "--skipApiVersionCheck"
    volumes:
      - azurite-forge-data:/data
    networks:
      - forge-net
    healthcheck:
      # Azurite ships on a Node base image so the healthcheck uses node
      # to probe the Table port - no curl/nc available in the image.
      test: ["CMD-SHELL", "node -e \"require('net').createConnection(10002,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  traefik-forge:
    <<: *traefik-common
    container_name: msmfg-traefik-forge
    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    volumes:
      - ./traefik/forge.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "5001:80"
    networks:
      # Multi-homed: forge-net reaches its own backend silos; heattreat-net
      # makes this Traefik the cross-cluster ingress for heattreat silos
      # (they POST /replicate/* here). No `wan` - the two cluster nets
      # are the only bridges, and only Traefiks span both.
      - forge-net
      - heattreat-net

  silo-forge-a:
    <<: *silo-common
    container_name: msmfg-silo-forge-a
    depends_on:
      azurite-forge:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      Cluster__SiloPortA: "11111"
      Cluster__SiloPortB: "11111"
      Cluster__GatewayPortA: "30000"
      Cluster__GatewayPortB: "30000"
      CLUSTER_NAME: "forge"
      SILO_ID: "a"
      Seeder__Enabled: "true"
      ConnectionStrings__AzureTableStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-forge:10000/devstoreaccount1;QueueEndpoint=http://azurite-forge:10001/devstoreaccount1;TableEndpoint=http://azurite-forge:10002/devstoreaccount1;"
      # Replication peers: a single URL per peer pointing at the peer's
      # Traefik. The peer Traefik is resolvable on forge-net because it
      # is multi-homed there; forge silos have NO route to heattreat
      # silos directly (no shared network). Traefik's round-robin
      # /replicate/* router + active health check handles per-silo
      # failover on the peer side. The multi-URL BaseUrls list is still
      # supported (see ReplicationHttpClient) and is recommended for
      # multi-zone topologies where each zone has its own Traefik.
      Replication__Peers__0__Name: "heattreat"
      Replication__Peers__0__BaseUrls__0: "http://traefik-heattreat:80"
    command: ["--cluster", "forge", "--silo-id", "a"]
    networks:
      - forge-net

  silo-forge-b:
    <<: *silo-common
    container_name: msmfg-silo-forge-b
    depends_on:
      azurite-forge:
        condition: service_healthy
      silo-forge-a:
        condition: service_started
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      Cluster__SiloPortA: "11111"
      Cluster__SiloPortB: "11111"
      Cluster__GatewayPortA: "30000"
      Cluster__GatewayPortB: "30000"
      CLUSTER_NAME: "forge"
      SILO_ID: "b"
      Seeder__Enabled: "false"
      ConnectionStrings__AzureTableStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-forge:10000/devstoreaccount1;QueueEndpoint=http://azurite-forge:10001/devstoreaccount1;TableEndpoint=http://azurite-forge:10002/devstoreaccount1;"
      Replication__Peers__0__Name: "heattreat"
      Replication__Peers__0__BaseUrls__0: "http://traefik-heattreat:80"
    command: ["--cluster", "forge", "--silo-id", "b"]
    networks:
      - forge-net

  # ----- Heattreat cluster ---------------------------------------------
  azurite-heattreat:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: msmfg-azurite-heattreat
    restart: unless-stopped
    command:
      - "azurite"
      - "--blobHost"
      - "0.0.0.0"
      - "--queueHost"
      - "0.0.0.0"
      - "--tableHost"
      - "0.0.0.0"
      - "--location"
      - "/data"
      - "--skipApiVersionCheck"
    volumes:
      - azurite-heattreat-data:/data
    networks:
      - heattreat-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').createConnection(10002,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  traefik-heattreat:
    <<: *traefik-common
    container_name: msmfg-traefik-heattreat
    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    volumes:
      - ./traefik/heattreat.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "5002:80"
    networks:
      # Multi-homed: heattreat-net reaches its own backend silos;
      # forge-net makes this Traefik the cross-cluster ingress for
      # forge silos (they POST /replicate/* here).
      - heattreat-net
      - forge-net

  silo-heattreat-a:
    <<: *silo-common
    container_name: msmfg-silo-heattreat-a
    depends_on:
      azurite-heattreat:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      Cluster__SiloPortA: "11111"
      Cluster__SiloPortB: "11111"
      Cluster__GatewayPortA: "30000"
      Cluster__GatewayPortB: "30000"
      CLUSTER_NAME: "heattreat"
      SILO_ID: "a"
      Seeder__Enabled: "false"
      ConnectionStrings__AzureTableStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-heattreat:10000/devstoreaccount1;QueueEndpoint=http://azurite-heattreat:10001/devstoreaccount1;TableEndpoint=http://azurite-heattreat:10002/devstoreaccount1;"
      Replication__Peers__0__Name: "forge"
      Replication__Peers__0__BaseUrls__0: "http://traefik-forge:80"
    command: ["--cluster", "heattreat", "--silo-id", "a"]
    networks:
      - heattreat-net

  silo-heattreat-b:
    <<: *silo-common
    container_name: msmfg-silo-heattreat-b
    depends_on:
      azurite-heattreat:
        condition: service_healthy
      silo-heattreat-a:
        condition: service_started
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      Cluster__SiloPortA: "11111"
      Cluster__SiloPortB: "11111"
      Cluster__GatewayPortA: "30000"
      Cluster__GatewayPortB: "30000"
      CLUSTER_NAME: "heattreat"
      SILO_ID: "b"
      Seeder__Enabled: "false"
      ConnectionStrings__AzureTableStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-heattreat:10000/devstoreaccount1;QueueEndpoint=http://azurite-heattreat:10001/devstoreaccount1;TableEndpoint=http://azurite-heattreat:10002/devstoreaccount1;"
      Replication__Peers__0__Name: "forge"
      Replication__Peers__0__BaseUrls__0: "http://traefik-forge:80"
    command: ["--cluster", "heattreat", "--silo-id", "b"]
    networks:
      - heattreat-net

