# MultiSiteManufacturing - Docker Compose topology (M14 + Traefik).
#
# Two Orleans clusters, each with its own Azurite and its own internal
# cluster network. A shared "wan" network carries only the cross-cluster
# HTTP replication traffic. A Traefik reverse proxy per cluster provides
# sticky-session load balancing across the cluster's two silos - so
# Blazor Server's SignalR circuit pins to one silo for the lifetime of
# the browser tab while the operator still sees a single host endpoint
# per cluster.
#
# Only TWO host ports are published:
#   5001 -> traefik-forge     -> sticky LB across silo-forge-a / silo-forge-b
#   5002 -> traefik-heattreat -> sticky LB across silo-heattreat-a / silo-heattreat-b
#
# Silo HTTP (:8080), Orleans silo (:11111), and gateway (:30000) ports
# are `expose`-d only on their internal networks - nothing silo-side
# is reachable from the host.
#
# Networks:
#   forge-net:      azurite-forge, silo-forge-a, silo-forge-b, traefik-forge
#   heattreat-net:  azurite-heattreat, silo-heattreat-a, silo-heattreat-b, traefik-heattreat
#   wan:            all four silos (replication only; neither Azurite nor Traefik on wan)
#
# Replication deliberately does NOT go through Traefik - it is a
# stateless HTTP POST with no session affinity and is already made
# silo-resilient by the app-layer multi-URL failover in
# ReplicationHttpClient. Keeping replication direct over `wan` keeps
# the Traefik surface purely a Blazor/UI concern.
#
# Simulate a cross-cluster partition:
#   docker network disconnect msmfg_wan silo-forge-a
#   docker network disconnect msmfg_wan silo-forge-b
#   docker network connect    msmfg_wan silo-forge-a
#   docker network connect    msmfg_wan silo-forge-b
#
# That is a genuine transport-level partition, not the hash-filter sim
# in FederationRouter.IsDroppedByPartitionAsync (Tier 4) - the two Tier
# types coexist; Tier 5 is network-level, Tier 4 stays as a fast-path
# simulation that requires no docker interaction.

name: msmfg

networks:
  forge-net:
    driver: bridge
  heattreat-net:
    driver: bridge
  wan:
    driver: bridge

volumes:
  azurite-forge-data:
  azurite-heattreat-data:

x-silo-common: &silo-common
  build:
    context: ../../
    dockerfile: samples/MultiSiteManufacturing/Dockerfile
  image: msmfg-host:dev
  restart: unless-stopped
  environment:
    # Orleans + ASP.NET Core bind configuration. ASPNETCORE_URLS must
    # bind 0.0.0.0 (via "+") so host port publishing reaches the app;
    # localhost inside a container only binds the loopback interface.
    ASPNETCORE_URLS: "http://+:8080"
    ASPNETCORE_ENVIRONMENT: "Production"
    # Each container has its own IP, so all silos can share fixed
    # Orleans ports - no A/B split needed inside the container. The
    # appsettings overlay still provides per-A/B ports for the legacy
    # localhost run.ps1 path; we override them here.
    Cluster__SiloPortA: "11111"
    Cluster__SiloPortB: "11111"
    Cluster__GatewayPortA: "30000"
    Cluster__GatewayPortB: "30000"
  expose:
    - "8080"
    - "11111"
    - "30000"

# ---- Traefik common config ------------------------------------------
# Use the file provider, not the docker provider. Docker Desktop on
# Windows frequently returns "Error response from daemon" on every
# docker-API call from inside a container, which leaves the docker
# provider with zero discovered routers and makes Traefik answer 404
# for every request. The file provider is trivial, socket-free, and
# just as capable for a two-backend sticky-LB setup.
x-traefik-common: &traefik-common
  image: traefik:v3.1
  restart: unless-stopped

services:
  # ----- Forge cluster --------------------------------------------------
  azurite-forge:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: msmfg-azurite-forge
    restart: unless-stopped
    command:
      - "azurite"
      - "--blobHost"
      - "0.0.0.0"
      - "--queueHost"
      - "0.0.0.0"
      - "--tableHost"
      - "0.0.0.0"
      - "--location"
      - "/data"
      - "--skipApiVersionCheck"
    volumes:
      - azurite-forge-data:/data
    networks:
      - forge-net
    healthcheck:
      # Azurite ships on a Node base image so the healthcheck uses node
      # to probe the Table port - no curl/nc available in the image.
      test: ["CMD-SHELL", "node -e \"require('net').createConnection(10002,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  traefik-forge:
    <<: *traefik-common
    container_name: msmfg-traefik-forge
    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    volumes:
      - ./traefik/forge.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "5001:80"
    networks:
      - forge-net

  silo-forge-a:
    <<: *silo-common
    container_name: msmfg-silo-forge-a
    depends_on:
      azurite-forge:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      Cluster__SiloPortA: "11111"
      Cluster__SiloPortB: "11111"
      Cluster__GatewayPortA: "30000"
      Cluster__GatewayPortB: "30000"
      CLUSTER_NAME: "forge"
      SILO_ID: "a"
      Seeder__Enabled: "true"
      ConnectionStrings__AzureTableStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-forge:10000/devstoreaccount1;QueueEndpoint=http://azurite-forge:10001/devstoreaccount1;TableEndpoint=http://azurite-forge:10002/devstoreaccount1;"
      # Replication peers: reach EITHER heattreat silo DIRECTLY over
      # the wan network (not via Traefik - replication is stateless
      # and already has app-layer multi-URL failover).
      Replication__Peers__0__Name: "heattreat"
      Replication__Peers__0__BaseUrls__0: "http://silo-heattreat-a:8080"
      Replication__Peers__0__BaseUrls__1: "http://silo-heattreat-b:8080"
    command: ["--cluster", "forge", "--silo-id", "a"]
    networks:
      - forge-net
      - wan

  silo-forge-b:
    <<: *silo-common
    container_name: msmfg-silo-forge-b
    depends_on:
      azurite-forge:
        condition: service_healthy
      silo-forge-a:
        condition: service_started
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      Cluster__SiloPortA: "11111"
      Cluster__SiloPortB: "11111"
      Cluster__GatewayPortA: "30000"
      Cluster__GatewayPortB: "30000"
      CLUSTER_NAME: "forge"
      SILO_ID: "b"
      Seeder__Enabled: "false"
      ConnectionStrings__AzureTableStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-forge:10000/devstoreaccount1;QueueEndpoint=http://azurite-forge:10001/devstoreaccount1;TableEndpoint=http://azurite-forge:10002/devstoreaccount1;"
      Replication__Peers__0__Name: "heattreat"
      Replication__Peers__0__BaseUrls__0: "http://silo-heattreat-a:8080"
      Replication__Peers__0__BaseUrls__1: "http://silo-heattreat-b:8080"
    command: ["--cluster", "forge", "--silo-id", "b"]
    networks:
      - forge-net
      - wan

  # ----- Heattreat cluster ---------------------------------------------
  azurite-heattreat:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: msmfg-azurite-heattreat
    restart: unless-stopped
    command:
      - "azurite"
      - "--blobHost"
      - "0.0.0.0"
      - "--queueHost"
      - "0.0.0.0"
      - "--tableHost"
      - "0.0.0.0"
      - "--location"
      - "/data"
      - "--skipApiVersionCheck"
    volumes:
      - azurite-heattreat-data:/data
    networks:
      - heattreat-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').createConnection(10002,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  traefik-heattreat:
    <<: *traefik-common
    container_name: msmfg-traefik-heattreat
    command:
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    volumes:
      - ./traefik/heattreat.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "5002:80"
    networks:
      - heattreat-net

  silo-heattreat-a:
    <<: *silo-common
    container_name: msmfg-silo-heattreat-a
    depends_on:
      azurite-heattreat:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      Cluster__SiloPortA: "11111"
      Cluster__SiloPortB: "11111"
      Cluster__GatewayPortA: "30000"
      Cluster__GatewayPortB: "30000"
      CLUSTER_NAME: "heattreat"
      SILO_ID: "a"
      Seeder__Enabled: "false"
      ConnectionStrings__AzureTableStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-heattreat:10000/devstoreaccount1;QueueEndpoint=http://azurite-heattreat:10001/devstoreaccount1;TableEndpoint=http://azurite-heattreat:10002/devstoreaccount1;"
      Replication__Peers__0__Name: "forge"
      Replication__Peers__0__BaseUrls__0: "http://silo-forge-a:8080"
      Replication__Peers__0__BaseUrls__1: "http://silo-forge-b:8080"
    command: ["--cluster", "heattreat", "--silo-id", "a"]
    networks:
      - heattreat-net
      - wan

  silo-heattreat-b:
    <<: *silo-common
    container_name: msmfg-silo-heattreat-b
    depends_on:
      azurite-heattreat:
        condition: service_healthy
      silo-heattreat-a:
        condition: service_started
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Production"
      Cluster__SiloPortA: "11111"
      Cluster__SiloPortB: "11111"
      Cluster__GatewayPortA: "30000"
      Cluster__GatewayPortB: "30000"
      CLUSTER_NAME: "heattreat"
      SILO_ID: "b"
      Seeder__Enabled: "false"
      ConnectionStrings__AzureTableStorage: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite-heattreat:10000/devstoreaccount1;QueueEndpoint=http://azurite-heattreat:10001/devstoreaccount1;TableEndpoint=http://azurite-heattreat:10002/devstoreaccount1;"
      Replication__Peers__0__Name: "forge"
      Replication__Peers__0__BaseUrls__0: "http://silo-forge-a:8080"
      Replication__Peers__0__BaseUrls__1: "http://silo-forge-b:8080"
    command: ["--cluster", "heattreat", "--silo-id", "b"]
    networks:
      - heattreat-net
      - wan

