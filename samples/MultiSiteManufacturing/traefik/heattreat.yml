# Traefik dynamic config for the heattreat cluster (file provider).
# See traefik/forge.yml for rationale and router-split explanation.
http:
  routers:
    heattreat-replicate:
      rule: "PathPrefix(`/replicate`)"

      entryPoints:
        - web
      service: heattreat-replicate

    heattreat-web:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      service: heattreat-web

  services:
    heattreat-replicate:
      loadBalancer:
        # Round-robin, no sticky cookie: replication POSTs are
        # stateless and either silo can apply a batch.
        servers:
          - url: "http://silo-heattreat-a:8080"
          - url: "http://silo-heattreat-b:8080"
        healthCheck:
          path: "/"
          interval: "2s"
          timeout: "1s"

    heattreat-web:
      loadBalancer:
        sticky:
          cookie:
            name: msmfg_heattreat_affinity
            httpOnly: true
            sameSite: lax
        servers:
          - url: "http://silo-heattreat-a:8080"
          - url: "http://silo-heattreat-b:8080"
        healthCheck:
          path: "/"
          interval: "2s"
          timeout: "1s"
