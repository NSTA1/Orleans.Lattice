# Traefik dynamic config for the EU cluster (file provider).
# See traefik/us.yml for rationale and router-split explanation.
http:
  routers:
    eu-replicate:
      rule: "PathPrefix(`/replicate`)"

      entryPoints:
        - web
      service: eu-replicate

    eu-web:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      service: eu-web

  services:
    eu-replicate:
      loadBalancer:
        # Round-robin, no sticky cookie: replication POSTs are
        # stateless and either silo can apply a batch.
        servers:
          - url: "http://silo-eu-a:8080"
          - url: "http://silo-eu-b:8080"
        healthCheck:
          path: "/"
          interval: "2s"
          timeout: "1s"

    eu-web:
      loadBalancer:
        sticky:
          cookie:
            name: msmfg_eu_affinity
            httpOnly: true
            sameSite: lax
        servers:
          - url: "http://silo-eu-a:8080"
          - url: "http://silo-eu-b:8080"
        healthCheck:
          path: "/"
          interval: "2s"
          timeout: "1s"
