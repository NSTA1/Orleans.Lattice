syntax = "proto3";

package multisitemfg.v1;

option csharp_namespace = "MultiSiteManufacturing.Contracts.V1";

// Compliance state lattice.
// `ComplianceState` enum.
enum ComplianceState {
  COMPLIANCE_STATE_UNSPECIFIED = 0;
  COMPLIANCE_STATE_NOMINAL = 1;
  COMPLIANCE_STATE_UNDER_INSPECTION = 2;
  COMPLIANCE_STATE_FLAGGED_FOR_REVIEW = 3;
  COMPLIANCE_STATE_REWORK = 4;
  COMPLIANCE_STATE_SCRAP = 5;
}

enum ProcessStage {
  PROCESS_STAGE_UNSPECIFIED = 0;
  PROCESS_STAGE_FORGE = 1;
  PROCESS_STAGE_HEAT_TREAT = 2;
  PROCESS_STAGE_MACHINING = 3;
  PROCESS_STAGE_NDT = 4;
  PROCESS_STAGE_MRB = 5;
  PROCESS_STAGE_FAI = 6;
}

enum ProcessSite {
  PROCESS_SITE_UNSPECIFIED = 0;
  PROCESS_SITE_OHIO_FORGE = 1;
  PROCESS_SITE_NAGOYA_HEAT_TREAT = 2;
  PROCESS_SITE_STUTTGART_MACHINING = 3;
  PROCESS_SITE_STUTTGART_CMM_LAB = 4;
  PROCESS_SITE_TOULOUSE_NDT_LAB = 5;
  PROCESS_SITE_CINCINNATI_MRB = 6;
  PROCESS_SITE_BRISTOL_FAI = 7;
}

enum Inspection {
  INSPECTION_UNSPECIFIED = 0;
  INSPECTION_CMM = 1;
  INSPECTION_FPI = 2;
  INSPECTION_EDDY_CURRENT = 3;
  INSPECTION_X_RAY = 4;
  INSPECTION_VISUAL = 5;
}

enum InspectionOutcome {
  INSPECTION_OUTCOME_UNSPECIFIED = 0;
  INSPECTION_OUTCOME_PASS = 1;
  INSPECTION_OUTCOME_FAIL = 2;
}

enum NcSeverity {
  NC_SEVERITY_UNSPECIFIED = 0;
  NC_SEVERITY_MINOR = 1;
  NC_SEVERITY_MAJOR = 2;
  NC_SEVERITY_CRITICAL = 3;
}

enum MrbDispositionKind {
  MRB_DISPOSITION_KIND_UNSPECIFIED = 0;
  MRB_DISPOSITION_KIND_USE_AS_IS = 1;
  MRB_DISPOSITION_KIND_REWORK = 2;
  MRB_DISPOSITION_KIND_SCRAP = 3;
  MRB_DISPOSITION_KIND_RETURN_TO_VENDOR = 4;
}

// Hybrid logical clock timestamp for cross-site fact ordering.
message Hlc {
  int64 wall_clock_ticks = 1;
  int32 counter = 2;
}
